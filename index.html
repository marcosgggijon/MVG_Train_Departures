<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Train Dashboard</title>
    <meta http-equiv="refresh" content="15">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #111;
            color: #fff;
            font-family: Arial, Helvetica, sans-serif;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 16px;
        }

        .panel {
            background: #1b1b1b;
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.35);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 12px;
            margin-bottom: 12px;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        .title {
            font-size: 1.4rem;
            font-weight: 700;
        }

        .updated {
            font-size: 0.85rem;
            color: #aaa;
        }

        .departure-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid #2e2e2e;
        }

        .departure-row:last-child {
            border-bottom: none;
        }

        .left {
            min-width: 0;
            flex: 1;
        }

        .line-destination {
            font-size: 1.05rem;
            font-weight: 700;
            line-height: 1.2;
            word-break: break-word;
        }

        .time {
            margin-top: 4px;
            font-size: 0.9rem;
            color: #aaa;
        }

        .right {
            font-size: 1.15rem;
            font-weight: 700;
            white-space: nowrap;
            color: #f5f5f5;
        }

        .no-data {
            padding: 24px 0;
            text-align: center;
            color: #bbb;
            font-size: 1rem;
        }

        @media (max-width: 480px) {
            .title {
                font-size: 1.2rem;
            }

            .line-destination {
                font-size: 0.98rem;
            }

            .right {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="panel">
            <div class="header">
                <div class="title">My Station</div>
                <div class="updated">Updated: 13.04.2026 20:24:55</div>
            </div>
            
            <div class="departure-row">
                <div class="left">
                    <div class="line-destination">S4 Buchenau</div>
                    <div class="time">20:36</div>
                </div>
                <div class="right">11 min</div>
            </div>
            
            <div class="departure-row">
                <div class="left">
                    <div class="line-destination">S4 Trudering</div>
                    <div class="time">20:42</div>
                </div>
                <div class="right">17 min</div>
            </div>
            
            <div class="departure-row">
                <div class="left">
                    <div class="line-destination">S4 Geltendorf</div>
                    <div class="time">20:56</div>
                </div>
                <div class="right">31 min</div>
            </div>
            
            <div class="departure-row">
                <div class="left">
                    <div class="line-destination">S4 Trudering</div>
                    <div class="time">21:02</div>
                </div>
                <div class="right">37 min</div>
            </div>
            
            <div class="departure-row">
                <div class="left">
                    <div class="line-destination">S4 Geltendorf</div>
                    <div class="time">21:16</div>
                </div>
                <div class="right">51 min</div>
            </div>
            
            <div class="departure-row">
                <div class="left">
                    <div class="line-destination">S4 Trudering</div>
                    <div class="time">21:22</div>
                </div>
                <div class="right">57 min</div>
            </div>
            
        </div>
    </div>
</body>
</html>
